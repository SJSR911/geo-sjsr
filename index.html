<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation Conducteur SSISJR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --fire: #c0392b; --dark: #2c3e50; }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; }
        header { background: var(--fire); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; background: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; }
        #map { flex: 1; }
        .sector-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        button { padding: 12px; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; font-weight: bold; transition: 0.2s; }
        .active { background: var(--dark) !important; color: white !important; }
        #quiz-box { border: 2px solid #f0f0f0; padding: 20px; text-align: center; border-radius: 12px; background: #fff; }
        #street-name { font-size: 1.5rem; color: var(--fire); margin: 15px 0; min-height: 1.5em; font-weight: 800; }
        .btn-next { background: var(--fire); color: white; width: 100%; border: none; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-show { background: #27ae60; color: white; width: 100%; border: none; font-size: 1.1rem; display: none; }
        .info-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        @media (max-width: 800px) { .main { flex-direction: column; } #sidebar { width: 100%; } #map { height: 300px; } }
    </style>
</head>
<body>

<header><h1>🚒 Connaissance du Territoire - SSISJR</h1></header>

<div class="main">
    <div id="sidebar">
        <h3>Secteurs d'étude</h3>
        <div class="sector-btns">
            <button class="btn-filter active" onclick="filtrer('Tous', this)">Tous</button>
            <button class="btn-filter" onclick="filtrer('Iberville', this)">Iberville</button>
            <button class="btn-filter" onclick="filtrer('Saint-Jean / Saint-Luc', this)">SJ / St-Luc</button>
        </div>

        <div id="quiz-box">
            <div id="sector-label" class="info-label">Chargement...</div>
            <div id="street-name">Initialisation...</div>
            <button class="btn-next" onclick="prochaineRue()">RUE SUIVANTE</button>
            <button id="btn-reveal" class="btn-show" onclick="revelerCarte()">VOIR SUR LA CARTE</button>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let toutesLesRues = [];
    let ruesFiltrees = [];
    let rueActuelle = null;
    let maCarte, monMarqueur;

    // 1. Initialisation
    function init() {
        maCarte = L.map('map').setView([45.3057, -73.2534], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(maCarte);
        monMarqueur = L.marker([0,0]).addTo(maCarte);
        monMarqueur.setOpacity(0);

        fetch('donnees_rues.json')
            .then(res => res.json())
            .then(data => {
                toutesLesRues = data;
                ruesFiltrees = data;
                document.getElementById('street-name').innerText = data.length + " rues prêtes";
                document.getElementById('sector-label').innerText = "Appuyez sur Suivante";
            })
            .catch(err => {
                document.getElementById('street-name').innerText = "Erreur de chargement JSON";
                console.error(err);
            });
    }

    // 2. Gestion des filtres (Correction Iberville)
    function filtrer(secteur, bouton) {
        // Visuel des boutons
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        bouton.classList.add('active');

        if (secteur === 'Tous') {
            ruesFiltrees = toutesLesRues;
        } else {
            // On compare sans tenir compte des majuscules et on cherche si le mot existe
            let motCle = secteur.split(' ')[0].toLowerCase(); // "iberville" ou "saint-jean"
            ruesFiltrees = toutesLesRues.filter(r => 
                r.secteur && r.secteur.toLowerCase().includes(motCle)
            );
        }
        
        prochaineRue();
    }

    // 3. Sélection d'une rue
    function prochaineRue() {
        if (ruesFiltrees.length === 0) {
            document.getElementById('street-name').innerText = "Aucune rue trouvée";
            document.getElementById('btn-reveal').style.display = 'none';
            return;
        }

        const index = Math.floor(Math.random() * ruesFiltrees.length);
        rueActuelle = ruesFiltrees[index];

        document.getElementById('street-name').innerText = rueActuelle.nom;
        document.getElementById('sector-label').innerText = rueActuelle.secteur;
        document.getElementById('btn-reveal').style.display = 'block';
        
        monMarqueur.setOpacity(0); // Cache la réponse
        monMarqueur.closePopup();
    }

    // 4. Révélation sur la carte (Bouton Emplacement)
    function revelerCarte() {
        if (!rueActuelle) return;
        
        const lat = rueActuelle.lat;
        const lng = rueActuelle.lng;

        if (lat && lng) {
            const pos = [lat, lng];
            monMarqueur.setLatLng(pos).setOpacity(1);
            monMarqueur.bindPopup("<b>" + rueActuelle.nom + "</b>").openPopup();
            maCarte.flyTo(pos, 16);
        } else {
            alert("Erreur : Coordonnées manquantes pour cette rue.");
        }
    }

    window.onload = init;
</script>

</body>
</html>
