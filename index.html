<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation SSISJR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #c0392b; color: white; padding: 10px; text-align: center; }
        .layout { display: flex; flex: 1; }
        #controls { width: 320px; padding: 20px; background: white; border-right: 1px solid #ddd; z-index: 1000; }
        #map { flex: 1; }
        .btn { width: 100%; padding: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; border: 1px solid #ccc; }
        .filter-group { display: flex; gap: 5px; margin-bottom: 20px; }
        .btn-filter { flex: 1; font-size: 0.8rem; }
        .active { background: #2c3e50; color: white; }
        .next { background: #c0392b; color: white; border: none; font-size: 1.1rem; }
        .reveal { background: #27ae60; color: white; border: none; display: none; }
        #display { text-align: center; border: 2px solid #f0f0f0; padding: 20px; border-radius: 10px; margin-bottom: 10px; }
        #street-name { font-size: 1.4rem; color: #c0392b; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<header><h1>🚒 Étude de Territoire</h1></header>

<div class="layout">
    <div id="controls">
        <div class="filter-group">
            <button class="btn btn-filter active" onclick="changerFiltre('Tous', this)">Tous</button>
            <button class="btn btn-filter" onclick="changerFiltre('Iberville', this)">Iberville</button>
            <button class="btn btn-filter" onclick="changerFiltre('Saint-Jean', this)">SJ/SL</button>
        </div>

        <div id="display">
            <div id="sector-info" style="color: #666; font-size: 0.8rem;">Chargement...</div>
            <div id="street-name">En attente</div>
            <button class="btn next" onclick="tirerRue()">RUE SUIVANTE</button>
            <button id="btn-reveal" class="btn reveal" onclick="montrer()">VOIR SUR LA CARTE</button>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let dataRues = [];
    let listeAffichee = [];
    let rueChoisie = null;
    let carte, marqueur;

    // Initialisation
    function init() {
        carte = L.map('map').setView([45.3057, -73.2534], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(carte);
        marqueur = L.marker([0,0]).addTo(carte);
        marqueur.setOpacity(0);

        fetch('donnees_rues.json')
            .then(r => r.json())
            .then(data => {
                dataRues = data;
                listeAffichee = data;
                document.getElementById('sector-info').innerText = data.length + " rues chargées";
                document.getElementById('street-name').innerText = "Cliquez sur Suivante";
            })
            .catch(e => {
                document.getElementById('street-name').innerText = "Erreur JSON";
            });
    }

    function changerFiltre(sec, btn) {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (sec === 'Tous') {
            listeAffichee = dataRues;
        } else {
            // Recherche très large : si le mot est contenu dans le secteur
            listeAffichee = dataRues.filter(r => 
                r.secteur && r.secteur.toLowerCase().includes(sec.toLowerCase())
            );
        }
        tirerRue();
    }

    function tirerRue() {
        if (listeAffichee.length === 0) {
            document.getElementById('street-name').innerText = "Aucune rue trouvée";
            return;
        }
        const index = Math.floor(Math.random() * listeAffichee.length);
        rueChoisie = listeAffichee[index];

        document.getElementById('street-name').innerText = rueChoisie.nom;
        document.getElementById('sector-info').innerText = rueChoisie.secteur;
        document.getElementById('btn-reveal').style.display = 'block';
        marqueur.setOpacity(0);
    }

    function montrer() {
        if (!rueChoisie) return;
        const coords = [rueChoisie.lat, rueChoisie.lng];
        marqueur.setLatLng(coords).setOpacity(1);
        marqueur.bindPopup(rueChoisie.nom).openPopup();
        carte.flyTo(coords, 16);
    }

    window.onload = init;
</script>
</body>
</html>
